modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="To Be Determined"
description='''
ButcherCraft is a planned Minecraft meat-processing and business-management simulation.

This build contains the project foundation only: registration, configuration, diagnostics, data generation, and a harmless development test item. Substantive gameplay systems are intentionally not implemented yet.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
